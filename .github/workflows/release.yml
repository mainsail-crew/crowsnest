name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        description: New version number in X.Y.Z
        required: true

jobs:
  update-default-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v6
        with:
          ref: 'v5'
          token: ${{ secrets.PAT }}
          fetch-depth: 0

      - name: Fast-forward merge from develop
        shell: bash
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git merge --ff-only origin/develop
          git push origin v5

  release:
    needs: [ 'update-default-branch' ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Fetch repo
        uses: actions/checkout@v6
        with:
          ref: 'v5'
          fetch-depth: 0

      - name: Get latest tag
        id: latest_tag
        shell: bash
        run: |
          echo "TAG_NAME=$(git describe --tags $(git rev-list --tags --max-count=1))" >> $GITHUB_OUTPUT
      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: generate-changelog
        with:
          config: ./cliff-release.toml
          args: ${{ steps.latest_tag.outputs.TAG_NAME }}..HEAD

      - name: Create release and upload build
        uses: softprops/action-gh-release@v3
        id: create-release
        with:
          name: v${{ github.event.inputs.version }}
          tag_name: v${{ github.event.inputs.version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          body: ${{ steps.generate-changelog.outputs.content }}

  update-changelog:
    needs: [ 'release' ]
    name: Generate changelog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: 'v5'
          token: ${{ secrets.PAT }}
          fetch-depth: 0

      - name: Get latest tag
        id: latest_tag
        shell: bash
        run: |
          echo "TAG_NAME=$(git describe --tags $(git rev-list --tags --max-count=1))" >> $GITHUB_OUTPUT
      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: v0.0.0..${{ steps.latest_tag.outputs.TAG_NAME }}
        env:
          OUTPUT: ${{ github.workspace }}/CHANGELOG.md

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'docs(changelog): update changelog'
          file_pattern: CHANGELOG.md

  update-develop-branch:
    needs: ['update-changelog']
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v6
        with:
          ref: 'develop'
          token: ${{ secrets.PAT }}
          fetch-depth: 0

      - name: Fast-forward merge from v5
        shell: bash
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git merge --ff-only origin/v5
          git push origin develop
